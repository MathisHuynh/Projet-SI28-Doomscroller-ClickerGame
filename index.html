<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div class="main">
            <img src="./assets/UI/cursor/default.png" class="cursor">

            <div class="desc"></div>
            <div class="gauche">
                <div class="info">
                    <p>
                        Shorties:<br />
                        <span class="score-val highlight-text"></span>
                        <img src="./assets/currency.gif" style="position: relative;top: 10px; width: 3%; height: auto;">
                    </p>
                </div>
                <div class="div-img-clickable">
                    <div class="scroll-area">
                        <img src="./assets/phone.gif" class="clicker" onclick="incrementerScore(event,true)" draggable="false">
                        <div class = "loading"><img src="./assets/loading.gif"></div>
                        <div class="area" id="area">
                            <div class="fade-top"></div>
                            <div class="fade-bottom"></div>            
                            <div class="scroll-content" id="scrollContent">
                                <div class="item">
                                    <img src="./assets/medias/OnceUponABouchardon.gif" draggable="false" alt="">
                                </div>
                                <div class="item">
                                    <img src="./assets/medias/OnceUponABouchardon.gif" draggable="false" alt="">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="statistiques">
                    <div class="texte">
                        <p>CPS: <span id="cps" class="highlight-text">0</span></p>
                        <p>SPC: <span id="spc" class="highlight-text">1</span></p>
                        <p>SPS: <span id="sps" class="highlight-text">0</span></p>
                    </div>
                </div>
            </div>

            <script id="template-upgrade" type="text/template">
                <div class="upgrade"
                id="{{id}}"
                onclick="acheterUpgrade('{{id}}')"
                onmouseenter="afficherDesc('{{id}}')" 
                onmouseleave="cacherDesc()">
                    <div class="sectionG">
                        <img src="{{image}}" alt="" class="upgrade-img">
                    </div>
                    <div class="sectionM">
                        <h4 style="font-weight:400;">{{nom}}</h4>
                        <div class="info-prix">
                            <p class="prixstr"><span class="prix-{{id}}">{{prix}}</span></p>
                            <img src="./assets/currency.gif" alt="" class="currency-img">
                        </div>
                    </div>
                    <div class="sectionD"> Niveau <span class="niveau-{{id}}">0</span> </div>

                    <div class="info-niv-suiv">
                        <p>
                            +<span class="bonus-{{id}}">{{bonusinit}}</span> points <br /> par clic
                        </p>
                    </div>
                </div>
            </script>

            <div class="droite">
                <div class="open_trophies_button" onclick="afficherTrophies()"></div>
                <div class="boutique">
                    <div id="intitule">Boutique</div>
                    <div id="upgrades"></div>
                </div>
                <div class="trophies"></div>
            </div>


        </div>
    </section>
    <script type="module" src="index.js"></script>
</body>
</html>
